<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello-world</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
    .card{background:#fff;border-radius:1.5rem;padding:3rem 2.5rem;text-align:center;max-width:480px;width:90%;box-shadow:0 25px 50px rgba(0,0,0,.15)}
    h1{font-size:2rem;color:#1a1a2e;margin:.75rem 0 .5rem}
    p{color:#666;line-height:1.6;margin:.5rem 0}
    .badge{display:inline-block;margin-top:1.5rem;padding:.4rem 1.2rem;border-radius:999px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.8rem;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:3.5rem">🚀</div>
    <h1>hello-world</h1>
    <p>Hello World! Your site is live on Nivi Cloud.</p>
    <div class="badge">Deployed via Nivi Cloud</div>
  </div>
</body>
</html>
